version: '3.8'

services:
  alura-agente:
    build: .
    container_name: alura-agente-rag
    ports:
      - "7860:7860"
    volumes:
      - ./docs:/app/docs
      - ./chroma_db:/app/chroma_db
      - ./.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
